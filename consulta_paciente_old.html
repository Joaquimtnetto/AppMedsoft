<body>
    <div class="consulta-container">
        <h2 class="consulta-titulo">Consulta de Paciente</h2>
        <form class="consulta-form" id="form-consulta-paciente" onsubmit="event.preventDefault(); buscarPaciente(event); return false;">
            <input id="busca-paciente" type="text" placeholder="Digite o nome ou código">
            <button type="submit">Buscar</button>
        </form>
        <div id="resultado-paciente" class="resultado-paciente"></div>
    </div>
    <style>
        .consulta-container {
            max-width: 600px;
            margin: 2.5vh 0 0 2vw;
            /* margem esquerda bem pequena */
            padding: 1.5rem 1.2rem 2.5rem 1.2rem;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 2px 16px 0 rgba(44, 62, 80, 0.10);
        }
        .consulta-titulo {
            text-align: center;
            font-size: 2.1rem;
            color: #357ae8;
            margin-bottom: 1.2rem;
            margin-top: 0.2rem;
            font-weight: 600;
        }
        #resultado-paciente {
            margin: 1.2rem auto 0 auto;
            padding: 1.1rem 0.7rem;
            background: #f8fbff;
            border-radius: 10px;
            min-height: 48px;
            max-width: 100%;
            box-shadow: 0 1px 6px 0 rgba(44, 62, 80, 0.07);
            font-size: 1.08rem;
            color: #222;
            text-align: left;
            word-break: break-word;
        }
        @media (max-width: 900px) {
            .consulta-container {
                max-width: 100vw;
                margin: 0;
                padding: 0.7rem 0 1rem 0;
                border-radius: 0;
                box-shadow: none;
            }
            .consulta-titulo {
                font-size: 1.08rem;
                margin-bottom: 0.5rem;
                margin-top: 0.1rem;
            }
            #resultado-paciente {
                padding: 0.4rem 0.05rem;
                font-size: 0.93rem;
                border-radius: 0;
                box-shadow: none;
            }
            .consulta-form input, .consulta-form button {
                font-size: 1rem;
            }
        }
    </style>
    <script>
    // Substitui ícone de ação por algo mais atraente ao renderizar a tabela
    const observer = new MutationObserver(() => {
        document.querySelectorAll('.paciente-table td.acao-col button, .paciente-table td.acao-col a').forEach(btn => {
            if (!btn.classList.contains('custom-icone')) {
                btn.innerHTML = '<i class="fa fa-notes-medical"></i>';
                btn.classList.add('custom-icone');
            }
        });
    });
    observer.observe(document.getElementById('resultado-paciente'), { childList: true, subtree: true });
    </script>
