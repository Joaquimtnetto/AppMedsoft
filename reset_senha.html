<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Redefinir Senha - MedSoft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f8ff;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .card{background:#fff;padding:24px;border-radius:12px;width:100%;max-width:420px;box-shadow:0 8px 30px rgba(0,0,0,0.06)}
    h2{margin:0 0 12px;color:#356ee8}
    .input{width:100%;padding:10px;border:1px solid #e0e6f8;border-radius:8px;margin-bottom:12px}
    .btn{background:#356ee8;color:#fff;padding:10px 14px;border-radius:8px;border:none;cursor:pointer}
    .msg{margin-top:12px;font-size:0.95rem}
  </style>
</head>
<body>
  <div class="card">
    <h2>Redefinir senha</h2>
    <p>Informe a nova senha para sua conta.</p>
    <input id="nova" class="input" type="password" placeholder="Nova senha" required>
    <input id="conf" class="input" type="password" placeholder="Confirmar nova senha" required>
    <button id="resetBtn" class="btn">Redefinir senha</button>
    <div id="msg" class="msg"></div>
    <div style="margin-top:10px;"><a href="/">Voltar ao login</a></div>
  </div>
  <script>
    const token = '{{ token }}';
    document.getElementById('resetBtn').addEventListener('click', async function(){
      const nova = document.getElementById('nova').value;
      const conf = document.getElementById('conf').value;
      const msg = document.getElementById('msg'); msg.textContent='';
      if(!nova || nova!==conf){ msg.textContent='As senhas não coincidem.'; return }
      try{
        const resp = await fetch('/reset-password', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({token: token, nova_senha: nova})});
        const data = await resp.json();
        msg.textContent = data.message || 'Operação concluída.';
        if(data.success){ setTimeout(()=>{ window.location.href='/' },1200) }
      }catch(e){ msg.textContent = 'Erro de conexão com o servidor.' }
    })
  </script>
  <script src="/static/js/navigation.js"></script>
</body>
</html>
