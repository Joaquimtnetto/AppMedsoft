<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Recuperar Senha - MedSoft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body{font-family: 'Segoe UI', Arial, sans-serif;background:#f5f8ff;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .card{background:#fff;padding:24px;border-radius:12px;width:100%;max-width:420px;box-shadow:0 8px 30px rgba(0,0,0,0.06)}
    h2{margin:0 0 12px;color:#356ee8}
    .input{width:100%;padding:10px;border:1px solid #e0e6f8;border-radius:8px;margin-bottom:12px}
    .btn{background:#356ee8;color:#fff;padding:10px 14px;border-radius:8px;border:none;cursor:pointer}
    .msg{margin-top:12px;font-size:0.95rem}
  </style>
</head>
<body>
  <div class="card">
    <h2>Recuperar senha</h2>
    <p>Informe o seu e-mail cadastrado. Enviaremos um link para redefinir a senha.</p>
    <input id="email" class="input" type="email" placeholder="Seu e-mail" required>
    <button id="sendBtn" class="btn">Enviar link de recuperação</button>
    <div id="msg" class="msg"></div>
    <div style="margin-top:10px;"><a href="/">Voltar ao login</a></div>
  </div>
  <script>
    document.getElementById('sendBtn').addEventListener('click', async function(){
      const email = document.getElementById('email').value.trim();
      const msg = document.getElementById('msg');
      msg.textContent = '';
      if(!email){ msg.textContent = 'Informe um e-mail válido.'; return }
      try{
        const resp = await fetch('/esqueci-senha', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email})});
        const data = await resp.json();
        msg.textContent = data.message || 'Operação concluída.';
        if(data.debug_link){
          const a = document.createElement('a'); a.href = data.debug_link; a.textContent = 'Abrir link (dev)'; a.target = '_blank';
          msg.appendChild(document.createElement('br'));
          msg.appendChild(a);
        }
      }catch(e){ msg.textContent = 'Erro de conexão com o servidor.' }
    })
  </script>
  <script src="/static/js/navigation.js"></script>
</body>
</html>
